<!doctype html>
<html lang="bg">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Кой иска да стане физик?</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game" id="game">
      <div class="science-pattern" aria-hidden="true"></div>
      <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="false" title="Звук">♪</button>

      <section class="lifelines" aria-label="Жокери">
        <button class="lifeline" id="hostLifeline" type="button" title="Помощ от водещия">
          <span class="host-icon" aria-hidden="true">
            <i></i>
          </span>
          <span class="sr-only">Помощ от водещия</span>
        </button>
        <button class="lifeline lifeline-text" id="fiftyLifeline" type="button" title="50 на 50">50:50</button>
        <button class="lifeline" id="phoneLifeline" type="button" title="Обади се на приятел">
          <span class="phone-icon" aria-hidden="true"></span>
          <span class="sr-only">Обади се на приятел</span>
        </button>
      </section>

      <section class="brand-zone" aria-label="Лого">
        <img class="brand-logo" src="assets/stani-fizik-logo.png" alt="Стани физик" />
      </section>

      <section class="question-zone" aria-live="polite">
        <div class="question-frame">
          <p id="questionText">Натисни „Играй“, за да започнеш.</p>
        </div>

        <div class="answers" id="answers"></div>

        <div class="center-badge" id="questionNumber">1</div>
        <div class="helper-panel" id="helperPanel" aria-live="polite"></div>

        <div class="actions">
          <button class="pill-button ghost" id="newGameButton" type="button">Нова игра</button>
          <button class="pill-button" id="continueButton" type="button" disabled>Продължи</button>
        </div>
      </section>

      <section class="start-screen is-visible" id="startScreen">
        <div class="start-card">
          <img src="assets/stani-fizik-logo.png" alt="Стани физик" />
          <h1>Кой иска да стане физик?</h1>
          <button class="pill-button start-button" id="startButton" type="button">Играй</button>
        </div>
      </section>

      <section class="result-screen" id="resultScreen" aria-hidden="true">
        <div class="result-card">
          <img src="assets/stani-fizik-logo.png" alt="" aria-hidden="true" />
          <p id="resultKicker">Поздравления</p>
          <h2 id="resultTitle">Край на играта</h2>
          <strong id="resultProgress">0 / 15</strong>
          <p id="resultMessage"></p>
          <button class="pill-button start-button" id="resultRestartButton" type="button">Нова игра</button>
        </div>
      </section>

      <section class="phone-overlay" id="phoneOverlay" aria-hidden="true" role="dialog" aria-label="Обади се на приятел">
        <div class="phone-timer-panel">
          <p class="phone-kicker">Обади се на приятел</p>
          <div class="phone-timer-ring" aria-live="polite">
            <span id="phoneCountdown">60</span>
          </div>
          <p class="phone-subtitle">секунди</p>
        </div>
      </section>
    </main>

    <script src="assets/audio/audio-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
